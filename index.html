<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">   
<title>жүҚж•ёе ұеғ№е·Ҙе…·</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#dcdcdc;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:420px;
    background:#f2f2f2;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    box-sizing:border-box;
}

h1{text-align:center;}

label{margin-top:15px; display:block;}

input{
    width:100%;
    padding:10px;
    font-size:16px;
    margin-top:5px;
}

.result{
    text-align:center;
    margin-top:20px;
}

.price{
    color:#e65100;
    font-size:26px;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.btn-generate{background:#3b82b6;color:white;}
.btn-copy{background:#2ea65c;color:white;}
.btn-clear{background:#999;color:white;}

.preview{
    margin-top:20px;
    background:#e8e8e8;
    padding:15px;
    border-radius:10px;
    white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>жүҚж•ёе ұеғ№е·Ҙе…·</h1>

<label>еҜ¬еәҰ (cm)</label>
<input id="width" type="number" oninput="calculate()">

<label>й«ҳеәҰ (cm)</label>
<input id="height" type="number" oninput="calculate()">

<label>е–®еғ№ (е…ғ / жүҚ)</label>
<input id="price" type="number" oninput="calculate()">

<div class="result">
<div id="talent">жүҚж•ёпјҡ0 жүҚ</div>
<div class="price" id="total">NT$ 0</div>
</div>

<button class="btn-generate" onclick="generateText()">з”ўз”ҹе ұеғ№иЁҠжҒҜ</button>
<button class="btn-copy" onclick="copyText()">иӨҮиЈҪиЁҠжҒҜ</button>
<button class="btn-clear" onclick="clearAll()">жё…з©ә</button>

<div class="preview" id="preview"></div>

</div>

<script>

let resultText = "";

/* вң… ж ёеҝғиЁҲз®— */
function calculate(){

let w = parseFloat(document.getElementById("width").value);
let h = parseFloat(document.getElementById("height").value);
let p = parseFloat(document.getElementById("price").value);

if(!w || !h){
document.getElementById("talent").innerText="жүҚж•ёпјҡ0 жүҚ";
document.getElementById("total").innerText="NT$ 0";
return;
}

let talent = Math.round((w*h)/900);

document.getElementById("talent").innerText="жүҚж•ёпјҡ"+talent+" жүҚ";

let total = (p ? talent*p : 0);

document.getElementById("total").innerText="NT$ "+total;

}

/* вң… з”ўз”ҹж–Үеӯ— */
function generateText(){

let w = document.getElementById("width").value;
let h = document.getElementById("height").value;
let p = document.getElementById("price").value;

let talent = Math.round((w*h)/900);
let total = (p ? talent*p : 0);

resultText =
"е°әеҜёпјҡ"+w+" Г— "+h+" cm\n"+
"жүҚж•ёпјҡ"+talent+" жүҚ\n"+
"йҮ‘йЎҚпјҡ"+total+" е…ғ";

document.getElementById("preview").innerText=resultText;

}

/* вң… иӨҮиЈҪ */
function copyText(){

if(!resultText){
alert("и«Ӣе…Ҳз”ўз”ҹе ұеғ№иЁҠжҒҜ");
return;
}

navigator.clipboard.writeText(resultText);
alert("е·ІиӨҮиЈҪ");

}

/* вң… жё…з©ә */
function clearAll(){

document.getElementById("width").value="";
document.getElementById("height").value="";
document.getElementById("price").value="";

document.getElementById("talent").innerText="жүҚж•ёпјҡ0 жүҚ";
document.getElementById("total").innerText="NT$ 0";
document.getElementById("preview").innerText="";

resultText="";

}

</script>

</body>
</html>
