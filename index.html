<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">   
<title>才數報價工具</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:sans-serif;
    background:#dcdcdc;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:420px;
    background:#f2f2f2;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    box-sizing:border-box;
    margin:auto;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}
    width:100%;
    padding:10px;
    font-size:16px;
    margin-top:5px;
}

.result{
    text-align:center;
    margin-top:20px;
}

.price{
    color:#e65100;
    font-size:26px;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.btn-generate{background:#3b82b6;color:white;}
.btn-copy{background:#2ea65c;color:white;}
.btn-clear{background:#999;color:white;}

.preview{
    margin-top:20px;
    background:#e8e8e8;
    padding:15px;
    border-radius:10px;
    white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>才數報價工具</h1>

<label>寬度 (cm)</label>
<input id="width" type="number" oninput="calculate()">

<label>高度 (cm)</label>
<input id="height" type="number" oninput="calculate()">

<label>單價 (元 / 才)</label>
<input id="price" type="number" oninput="calculate()">

<div class="result">
<div id="talent">才數：0 才</div>
<div class="price" id="total">NT$ 0</div>
</div>

<button class="btn-generate" onclick="generateText()">產生報價訊息</button>
<button class="btn-copy" onclick="copyText()">複製訊息</button>
<button class="btn-clear" onclick="clearAll()">清空</button>

<div class="preview" id="preview"></div>

</div>

<script>

let resultText = "";

/* ✅ 核心計算 */
function calculate(){

let w = parseFloat(document.getElementById("width").value);
let h = parseFloat(document.getElementById("height").value);
let p = parseFloat(document.getElementById("price").value);

if(!w || !h){
document.getElementById("talent").innerText="才數：0 才";
document.getElementById("total").innerText="NT$ 0";
return;
}

let talent = Math.round((w*h)/900);

document.getElementById("talent").innerText="才數："+talent+" 才";

let total = (p ? talent*p : 0);

document.getElementById("total").innerText="NT$ "+total;

}

/* ✅ 產生文字 */
function generateText(){

let w = document.getElementById("width").value;
let h = document.getElementById("height").value;
let p = document.getElementById("price").value;

let talent = Math.round((w*h)/900);
let total = (p ? talent*p : 0);

resultText =
"尺寸："+w+" × "+h+" cm\n"+
"才數："+talent+" 才\n"+
"金額："+total+" 元";

document.getElementById("preview").innerText=resultText;

}

/* ✅ 複製 */
function copyText(){

if(!resultText){
alert("請先產生報價訊息");
return;
}

navigator.clipboard.writeText(resultText);
alert("已複製");

}

/* ✅ 清空 */
function clearAll(){

document.getElementById("width").value="";
document.getElementById("height").value="";
document.getElementById("price").value="";

document.getElementById("talent").innerText="才數：0 才";
document.getElementById("total").innerText="NT$ 0";
document.getElementById("preview").innerText="";

resultText="";

}

</script>

</body>
</html>
