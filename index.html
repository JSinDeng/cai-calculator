<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>才數計算器</title>
<style>
*{box-sizing:border-box}
body{
 margin:0;padding:20px;font-family:Arial,sans-serif;
 background:#dcdcdc;display:flex;justify-content:center;align-items:center;
 min-height:100vh;
}
.card{
 width:100%;max-width:430px;background:#f5f5f5;
 border-radius:16px;padding:24px;
 box-shadow:0 8px 20px rgba(0,0,0,.18);
}
h1{margin:0 0 22px;text-align:center}
label{display:block;margin:14px 0 6px;font-weight:600}
input{
 width:100%;padding:12px;font-size:17px;
 border:1px solid #ccc;border-radius:8px;
}
.info{
 margin-top:18px;text-align:center;line-height:1.8;
}
.info .value{font-size:24px;font-weight:bold}
.price{font-size:30px;color:#d35400;font-weight:bold}
button{
 width:100%;padding:12px;border:none;border-radius:8px;
 font-size:16px;margin-top:10px;cursor:pointer;
}
#copy{background:#2ea65c;color:#fff}
#clear{background:#888;color:#fff}
.preview{
 margin-top:18px;background:#ececec;border-radius:10px;
 padding:14px;white-space:pre-line;line-height:1.6;
}
.tip{
 text-align:center;color:#1b7d32;font-size:14px;
 margin-top:8px;height:20px;
}
</style>
</head>
<body>
<div class="card">
<h1>才數報價工具</h1>

<label>寬度 (cm)</label>
<input id="width" type="number" inputmode="decimal">

<label>高度 (cm)</label>
<input id="height" type="number" inputmode="decimal">

<label>單價 (元 / 才)</label>
<input id="price" type="number" inputmode="decimal">

<div class="info">
<div>實際才數</div>
<div class="value" id="raw">0.00 才</div>

<div>計價才數</div>
<div class="value" id="bill">0 才</div>

<div>總價</div>
<div class="price" id="total">NT$0</div>
</div>

<button id="copy">複製報價訊息</button>
<button id="clear">清空</button>

<div class="tip" id="tip"></div>

<div class="preview" id="preview">請輸入尺寸與單價…</div>

</div>

<script>
const w=document.getElementById("width");
const h=document.getElementById("height");
const p=document.getElementById("price");

const raw=document.getElementById("raw");
const bill=document.getElementById("bill");
const total=document.getElementById("total");
const preview=document.getElementById("preview");
const tip=document.getElementById("tip");

function update(){

 const width=parseFloat(w.value)||0;
 const height=parseFloat(h.value)||0;
 const price=parseFloat(p.value)||0;

 if(width<=0 || height<=0){
    raw.textContent="0.00 才";
    bill.textContent="0 才";
    total.textContent="NT$0";
    preview.textContent="請輸入尺寸與單價…";
    return;
 }

 const rawTalent=(width*height)/900;
 const billTalent=Math.ceil(rawTalent);
 const money=billTalent*price;

 raw.textContent=rawTalent.toFixed(2)+" 才";
 bill.textContent=billTalent+" 才";
 total.textContent="NT$"+money;

 preview.textContent=
`尺寸：${width} × ${height} cm
實際才數：${rawTalent.toFixed(2)} 才
計價才數：${billTalent} 才
總價：NT$${money}`;
}

[w,h,p].forEach(el=>{
 el.addEventListener("input",update);
 el.addEventListener("keydown",e=>{
   if(e.key==="Enter"){
      e.preventDefault();
      if(el===w) h.focus();
      else if(el===h) p.focus();
   }
 });
});

document.getElementById("copy").onclick=async()=>{
 try{
   await navigator.clipboard.writeText(preview.textContent);
   tip.textContent="✓ 已複製到剪貼簿";
   setTimeout(()=>tip.textContent="",2000);
 }catch{
   alert("複製失敗");
 }
};

document.getElementById("clear").onclick=()=>{
 w.value="";
 h.value="";
 p.value="";
 update();
 w.focus();
};

update();
</script>
</body>
</html>
